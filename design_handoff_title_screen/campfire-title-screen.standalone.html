document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"12db1208-369c-495b-ba1c-7e7970c1d65e\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <style>/* ==========================================================\n   CAMPFIRE — Color tokens\n   Lifted verbatim from the game's theme.css DESIGN TOKENS block.\n   The world is a moonlit night; the fire is the only warm light.\n   ========================================================== */\n:root {\n  /* ---- Night (the painted world) ---- */\n  --night-void: #0d141d;              /* deepest sky, page base behind the painting */\n  --night-panel: rgba(11, 18, 28, 0.55);  /* inset panels: inputs, story boxes, timer track */\n  --night-card: rgba(18, 26, 38, 0.88);   /* cards — translucent so the sky shows through */\n\n  /* ---- Ink (text on the night) ---- */\n  --ink: #f1eee3;                     /* main text — warm paper white */\n  --ink-soft: #b8b3a6;                /* secondary text — muted ash */\n\n  /* ---- Fire (the single warm accent) ---- */\n  --accent: #e98f3e;                  /* buttons & highlights — campfire orange */\n  --accent-ink: #241405;              /* text on accent-colored things — charred brown */\n\n  /* ---- Signals ---- */\n  --danger: #e8705f;                  /* ember red — errors, burnt marshmallow picks */\n  --good: #7cc79a;                    /* sage green — connected, valid, done */\n\n  /* ---- Lines ---- */\n  --border: rgba(241, 238, 227, 0.16);  /* hairline — warm white at low alpha */\n\n  /* ==========================================================\n     THE CAMPFIRE PALETTE — the painted flame, smoke & mallows\n     ========================================================== */\n  --flame-outer: #e6772e;\n  --flame-mid: #f2a33c;\n  --flame-inner: #f7d154;   /* the hot yellow heart */\n  --ember: #e25822;\n  --ember-deep: #d9480f;\n  --log: #7a5a3a;\n\n  --smoke: #a7b1bd;         /* moonlit smoke */\n  --silhouette: #c9d0d8;    /* the buffooneries drifting in the smoke */\n\n  --mallow-gold: #f0c987;        /* golden marshmallow — best story */\n  --mallow-gold-edge: #c9974f;\n  --mallow-burnt: #3a3531;       /* burnt marshmallow — worst story */\n  --mallow-burnt-edge: #1f1c19;\n  --stick: #8a6d4a;              /* roasting stick */\n\n  /* ==========================================================\n     SEMANTIC ALIASES — reach for these in components\n     ========================================================== */\n  --text-primary: var(--ink);\n  --text-secondary: var(--ink-soft);\n  --text-on-accent: var(--accent-ink);\n  --text-accent: var(--accent);\n\n  --surface-page: var(--night-void);\n  --surface-card: var(--night-card);\n  --surface-inset: var(--night-panel);\n\n  --border-hairline: var(--border);\n  --border-accent: rgba(233, 143, 62, 0.4);   /* fire-tinted border for theme banners */\n  --border-gold: var(--mallow-gold-edge);\n\n  --fill-accent: var(--accent);\n  --fill-good: var(--good);\n  --fill-danger: var(--danger);\n\n  /* Fire-glow tints used for banners & selected states */\n  --tint-fire-strong: rgba(233, 143, 62, 0.22);\n  --tint-fire-soft: rgba(233, 143, 62, 0.08);\n  --tint-gold: rgba(240, 201, 135, 0.18);\n}\n<\u002Fstyle>\n  <style>/* ==========================================================\n   CAMPFIRE — Typography tokens\n   Two voices only: a clean system sans for the interface (UI,\n   buttons, labels) and a warm serif for the STORIES themselves.\n   Campfire ships no webfonts on purpose — game night should load\n   instantly on any device. The warmth lives in the painting, not\n   the letterforms.\n   ========================================================== */\n:root {\n  /* ---- Families ---- */\n  --font-ui: system-ui, -apple-system, \"Segoe UI\", sans-serif;\n  --font-story: Georgia, \"Times New Roman\", serif;   /* the storytelling voice */\n  --font-mono: ui-monospace, \"SF Mono\", Menlo, monospace;\n\n  /* ---- Sizes (px, matching the game) ---- */\n  --text-room-code: 40px;   /* the big spaced-out room code */\n  --text-h1: 30px;          /* hero title */\n  --text-h1-card: 26px;     /* h1 inside a card */\n  --text-h2: 20px;\n  --text-story: 17px;       /* story segments & textarea */\n  --text-body: 16px;        /* buttons, inputs */\n  --text-label: 14px;       /* labels, subtitles, chips */\n  --text-small: 13px;\n  --text-micro: 11px;       /* the uppercase THEME label */\n\n  /* ---- Line heights ---- */\n  --leading-tight: 1.2;\n  --leading-body: 1.5;\n  --leading-story: 1.7;     /* generous, for reading aloud */\n\n  /* ---- Weights ---- */\n  --weight-normal: 400;\n  --weight-medium: 500;\n  --weight-semibold: 600;\n  --weight-bold: 700;\n\n  /* ---- Tracking ---- */\n  --tracking-code: 10px;    /* the room code's wide letter-spacing */\n  --tracking-eyebrow: 0.08em;   /* uppercase micro labels */\n}\n<\u002Fstyle>\n  <style>/* ==========================================================\n   CAMPFIRE — Spacing, radius & layout tokens\n   ========================================================== */\n:root {\n  /* ---- Spacing scale (the game leans on 4/6/8/10/12/16/24/28) ---- */\n  --space-1: 4px;\n  --space-2: 6px;\n  --space-3: 8px;\n  --space-4: 10px;\n  --space-5: 12px;\n  --space-6: 16px;\n  --space-7: 24px;\n  --space-8: 28px;   /* card padding */\n  --space-9: 40px;\n\n  /* ---- Radius ---- */\n  --radius: 14px;        /* cards — the signature roundness */\n  --radius-control: 10px;   /* buttons, inputs, story boxes, chips-that-arent-pills */\n  --radius-pill: 999px;     /* player chips, badges, marshmallow campers, toasts */\n\n  /* ---- Layout ---- */\n  --app-max-width: 640px;   /* the single centered column */\n  --page-pad-x: 16px;\n  --page-pad-top: 24px;\n  --page-pad-bottom: 210px; /* room at the bottom for the campfire */\n\n  /* ---- Semantic aliases ---- */\n  --card-padding: var(--space-8);\n  --gap-btn-row: var(--space-4);\n  --gap-field: var(--space-6);\n}\n<\u002Fstyle>\n  <style>/* ==========================================================\n   CAMPFIRE — Elevation, blur & motion tokens\n   Campfire has almost no hard shadows — depth comes from\n   translucency + backdrop blur (the night sky reads through\n   every card) and from the fire's warm glow.\n   ========================================================== */\n:root {\n  /* ---- Backdrop blur (the defining \"night glass\" effect) ---- */\n  --blur-card: 5px;       /* cards blur the painting behind them */\n  --blur-chrome: 6px;     /* the floating timer bar */\n\n  /* ---- Shadows (used sparingly) ---- */\n  --shadow-toast: 0 6px 24px rgba(0, 0, 0, 0.4);\n  --shadow-glow-fire: 0 0 26px rgba(233, 143, 62, 0.45);   /* the fire's drop-shadow at full blaze */\n\n  /* ---- Text scrims (headings sit directly on a busy painting) ---- */\n  --text-scrim-h1: 0 2px 14px rgba(0, 0, 0, 0.85), 0 1px 3px rgba(0, 0, 0, 0.9);\n  --text-scrim-soft: 0 1px 8px rgba(0, 0, 0, 0.8);\n\n  /* Plate behind hero text so it never fights the moon */\n  --scrim-plate: linear-gradient(rgba(10, 15, 24, 0.55), rgba(10, 15, 24, 0.18)); /* @kind other */\n\n  /* ---- Motion ---- */\n  /* the fire dwindle */\n  --ease-fire: ease; /* @kind other */\n  /* fire scale/opacity/filter transition */\n  --dur-fire: 1.5s; /* @kind other */\n  /* timer bar countdown (linear) */\n  --dur-timer: 1s; /* @kind other */\n  /* toast slide-in */\n  --dur-toast: 0.3s; /* @kind other */\n  /* hover/press */\n  --dur-quick: 0.2s; /* @kind other */\n\n  /* Opacity used for disabled controls */\n  --disabled-opacity: 0.4;        /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* ==========================================================\n   CAMPFIRE — global stylesheet entry point.\n   Consumers link this one file. It is a manifest of @imports\n   only; every token & font lives in the files below.\n   ========================================================== */\n/* ==========================================================\n   CAMPFIRE — Color tokens\n   Lifted verbatim from the game's theme.css DESIGN TOKENS block.\n   The world is a moonlit night; the fire is the only warm light.\n   ========================================================== */\n:root {\n  /* ---- Night (the painted world) ---- */\n  --night-void: #0d141d;              /* deepest sky, page base behind the painting */\n  --night-panel: rgba(11, 18, 28, 0.55);  /* inset panels: inputs, story boxes, timer track */\n  --night-card: rgba(18, 26, 38, 0.88);   /* cards — translucent so the sky shows through */\n\n  /* ---- Ink (text on the night) ---- */\n  --ink: #f1eee3;                     /* main text — warm paper white */\n  --ink-soft: #b8b3a6;                /* secondary text — muted ash */\n\n  /* ---- Fire (the single warm accent) ---- */\n  --accent: #e98f3e;                  /* buttons & highlights — campfire orange */\n  --accent-ink: #241405;              /* text on accent-colored things — charred brown */\n\n  /* ---- Signals ---- */\n  --danger: #e8705f;                  /* ember red — errors, burnt marshmallow picks */\n  --good: #7cc79a;                    /* sage green — connected, valid, done */\n\n  /* ---- Lines ---- */\n  --border: rgba(241, 238, 227, 0.16);  /* hairline — warm white at low alpha */\n\n  /* ==========================================================\n     THE CAMPFIRE PALETTE — the painted flame, smoke & mallows\n     ========================================================== */\n  --flame-outer: #e6772e;\n  --flame-mid: #f2a33c;\n  --flame-inner: #f7d154;   /* the hot yellow heart */\n  --ember: #e25822;\n  --ember-deep: #d9480f;\n  --log: #7a5a3a;\n\n  --smoke: #a7b1bd;         /* moonlit smoke */\n  --silhouette: #c9d0d8;    /* the buffooneries drifting in the smoke */\n\n  --mallow-gold: #f0c987;        /* golden marshmallow — best story */\n  --mallow-gold-edge: #c9974f;\n  --mallow-burnt: #3a3531;       /* burnt marshmallow — worst story */\n  --mallow-burnt-edge: #1f1c19;\n  --stick: #8a6d4a;              /* roasting stick */\n\n  /* ==========================================================\n     SEMANTIC ALIASES — reach for these in components\n     ========================================================== */\n  --text-primary: var(--ink);\n  --text-secondary: var(--ink-soft);\n  --text-on-accent: var(--accent-ink);\n  --text-accent: var(--accent);\n\n  --surface-page: var(--night-void);\n  --surface-card: var(--night-card);\n  --surface-inset: var(--night-panel);\n\n  --border-hairline: var(--border);\n  --border-accent: rgba(233, 143, 62, 0.4);   /* fire-tinted border for theme banners */\n  --border-gold: var(--mallow-gold-edge);\n\n  --fill-accent: var(--accent);\n  --fill-good: var(--good);\n  --fill-danger: var(--danger);\n\n  /* Fire-glow tints used for banners & selected states */\n  --tint-fire-strong: rgba(233, 143, 62, 0.22);\n  --tint-fire-soft: rgba(233, 143, 62, 0.08);\n  --tint-gold: rgba(240, 201, 135, 0.18);\n}\n\n/* ==========================================================\n   CAMPFIRE — Typography tokens\n   Two voices only: a clean system sans for the interface (UI,\n   buttons, labels) and a warm serif for the STORIES themselves.\n   Campfire ships no webfonts on purpose — game night should load\n   instantly on any device. The warmth lives in the painting, not\n   the letterforms.\n   ========================================================== */\n:root {\n  /* ---- Families ---- */\n  --font-ui: system-ui, -apple-system, \"Segoe UI\", sans-serif;\n  --font-story: Georgia, \"Times New Roman\", serif;   /* the storytelling voice */\n  --font-mono: ui-monospace, \"SF Mono\", Menlo, monospace;\n\n  /* ---- Sizes (px, matching the game) ---- */\n  --text-room-code: 40px;   /* the big spaced-out room code */\n  --text-h1: 30px;          /* hero title */\n  --text-h1-card: 26px;     /* h1 inside a card */\n  --text-h2: 20px;\n  --text-story: 17px;       /* story segments & textarea */\n  --text-body: 16px;        /* buttons, inputs */\n  --text-label: 14px;       /* labels, subtitles, chips */\n  --text-small: 13px;\n  --text-micro: 11px;       /* the uppercase THEME label */\n\n  /* ---- Line heights ---- */\n  --leading-tight: 1.2;\n  --leading-body: 1.5;\n  --leading-story: 1.7;     /* generous, for reading aloud */\n\n  /* ---- Weights ---- */\n  --weight-normal: 400;\n  --weight-medium: 500;\n  --weight-semibold: 600;\n  --weight-bold: 700;\n\n  /* ---- Tracking ---- */\n  --tracking-code: 10px;    /* the room code's wide letter-spacing */\n  --tracking-eyebrow: 0.08em;   /* uppercase micro labels */\n}\n\n/* ==========================================================\n   CAMPFIRE — Spacing, radius & layout tokens\n   ========================================================== */\n:root {\n  /* ---- Spacing scale (the game leans on 4/6/8/10/12/16/24/28) ---- */\n  --space-1: 4px;\n  --space-2: 6px;\n  --space-3: 8px;\n  --space-4: 10px;\n  --space-5: 12px;\n  --space-6: 16px;\n  --space-7: 24px;\n  --space-8: 28px;   /* card padding */\n  --space-9: 40px;\n\n  /* ---- Radius ---- */\n  --radius: 14px;        /* cards — the signature roundness */\n  --radius-control: 10px;   /* buttons, inputs, story boxes, chips-that-arent-pills */\n  --radius-pill: 999px;     /* player chips, badges, marshmallow campers, toasts */\n\n  /* ---- Layout ---- */\n  --app-max-width: 640px;   /* the single centered column */\n  --page-pad-x: 16px;\n  --page-pad-top: 24px;\n  --page-pad-bottom: 210px; /* room at the bottom for the campfire */\n\n  /* ---- Semantic aliases ---- */\n  --card-padding: var(--space-8);\n  --gap-btn-row: var(--space-4);\n  --gap-field: var(--space-6);\n}\n\n/* ==========================================================\n   CAMPFIRE — Elevation, blur & motion tokens\n   Campfire has almost no hard shadows — depth comes from\n   translucency + backdrop blur (the night sky reads through\n   every card) and from the fire's warm glow.\n   ========================================================== */\n:root {\n  /* ---- Backdrop blur (the defining \"night glass\" effect) ---- */\n  --blur-card: 5px;       /* cards blur the painting behind them */\n  --blur-chrome: 6px;     /* the floating timer bar */\n\n  /* ---- Shadows (used sparingly) ---- */\n  --shadow-toast: 0 6px 24px rgba(0, 0, 0, 0.4);\n  --shadow-glow-fire: 0 0 26px rgba(233, 143, 62, 0.45);   /* the fire's drop-shadow at full blaze */\n\n  /* ---- Text scrims (headings sit directly on a busy painting) ---- */\n  --text-scrim-h1: 0 2px 14px rgba(0, 0, 0, 0.85), 0 1px 3px rgba(0, 0, 0, 0.9);\n  --text-scrim-soft: 0 1px 8px rgba(0, 0, 0, 0.8);\n\n  /* Plate behind hero text so it never fights the moon */\n  --scrim-plate: linear-gradient(rgba(10, 15, 24, 0.55), rgba(10, 15, 24, 0.18)); /* @kind other */\n\n  /* ---- Motion ---- */\n  /* the fire dwindle */\n  --ease-fire: ease; /* @kind other */\n  /* fire scale/opacity/filter transition */\n  --dur-fire: 1.5s; /* @kind other */\n  /* timer bar countdown (linear) */\n  --dur-timer: 1s; /* @kind other */\n  /* toast slide-in */\n  --dur-toast: 0.3s; /* @kind other */\n  /* hover/press */\n  --dur-quick: 0.2s; /* @kind other */\n\n  /* Opacity used for disabled controls */\n  --disabled-opacity: 0.4;        /* @kind other */\n}\n\n<\u002Fstyle>\n  <script src=\"04a35abf-950d-48e0-a609-0f9c20b0d960\"><\u002Fscript>\n  <style>\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html, body { height: 100%; }\n    body { background: #14100d; font-family: system-ui, -apple-system, \"Segoe UI\", sans-serif; color: #f1eee3; }\n    @keyframes cf-twinkle { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 0.9; transform: scale(1.15); } }\n    @keyframes cf-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }\n    @keyframes cf-spin-rev { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }\n    @keyframes cf-drift { 0% { transform: translateX(-14px); } 100% { transform: translateX(14px); } }\n    @keyframes cf-letter-float { 0% { transform: translateY(0px); } 100% { transform: translateY(-9px); } }\n    @keyframes cf-smoke-rise {\n      0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }\n      10% { opacity: 0.5; }\n      55% { transform: translate(calc(-50% + 46px), -55vh) scale(1.3); opacity: 0.42; }\n      85% { opacity: 0.3; }\n      100% { transform: translate(calc(-50% + 24px), -78vh) scale(2); opacity: 0; }\n    }\n    @keyframes cf-pool { 0% { transform: translate(-3%, 0) scale(1); } 100% { transform: translate(3%, -4px) scale(1.07); } }\n    @keyframes cf-ember-rise {\n      0% { transform: translate(0, 0) scale(1); opacity: 0; }\n      10% { opacity: 0.95; }\n      60% { opacity: 0.7; }\n      100% { transform: translate(26px, -340px) scale(0.3); opacity: 0; }\n    }\n    @keyframes cf-sway { 0% { transform: rotate(-0.7deg); } 100% { transform: rotate(0.7deg); } }\n    @keyframes cff-sway { 0%,100% { transform: rotate(-1.4deg); } 50% { transform: rotate(1.4deg); } }\n    @keyframes cff-flick {\n      0%   { transform: scaleY(1)    scaleX(1)   translateY(0); }\n      22%  { transform: scaleY(1.06) scaleX(.965) translateY(-4px); }\n      46%  { transform: scaleY(.975) scaleX(1.03) translateY(1px); }\n      70%  { transform: scaleY(1.07) scaleX(.955) translateY(-5px); }\n      100% { transform: scaleY(1)    scaleX(1)   translateY(0); }\n    }\n    @keyframes cff-core { 0%,100% { transform: scaleY(1) translateY(0); opacity: .95; } 50% { transform: scaleY(1.1) translateY(-3px); opacity: 1; } }\n    @keyframes cff-tongue { 0%,100% { transform: scaleY(.85) translateY(4px); opacity: .5; } 40% { transform: scaleY(1.15) translateY(-6px); opacity: .95; } 70% { transform: scaleY(.95) translateY(-1px); opacity: .8; } }\n    @keyframes cff-coal { 0%,100% { opacity: .55; } 50% { opacity: 1; } }\n    @keyframes cf-owl-fly {\n      0%, 62% { transform: translate(-160px, 30px); opacity: 0; }\n      63% { opacity: 0.9; }\n      79% { opacity: 0.9; }\n      80% { transform: translate(calc(100vw + 160px), -60px); opacity: 0; }\n      100% { transform: translate(-160px, 30px); opacity: 0; }\n    }\n    @keyframes cf-owl-flap { 0% { transform: rotate(14deg); } 100% { transform: rotate(-22deg); } }\n    @keyframes cf-bigfoot-peek {\n      0%, 71% { transform: translateX(105px); }\n      75%, 86% { transform: translateX(18px); }\n      90%, 100% { transform: translateX(105px); }\n    }\n    @keyframes cf-star-shoot {\n      0%, 88% { transform: translate(0, 0); opacity: 0; }\n      89% { opacity: 0.9; }\n      93% { transform: translate(-260px, 120px); opacity: 0; }\n      100% { transform: translate(0, 0); opacity: 0; }\n    }\n    @keyframes cf-tail-swish { 0% { transform: rotate(0deg); } 100% { transform: rotate(-10deg); } }\n    @media (prefers-reduced-motion: reduce) {\n      *, *::before, *::after { animation: none !important; transition: none !important; }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div data-screen-label=\"Title screen v2 — starry night\" style=\"position: relative; width: 100%; height: 100%; min-height: 760px; overflow: hidden; background: #14100d;\">\n\n  <!-- ====== HAND-PAINTED SKY: swirls, spiral stars, moon, ridges, teal meadow ====== -->\n  <svg aria-hidden=\"true\" viewBox=\"0 0 1440 900\" preserveAspectRatio=\"xMidYMid slice\" style=\"position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0;\">\n    <defs>\n      <linearGradient id=\"v2-sky\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n        <stop offset=\"0\" stop-color=\"#33261a\"><\u002Fstop>\n        <stop offset=\"0.45\" stop-color=\"#292018\"><\u002Fstop>\n        <stop offset=\"0.72\" stop-color=\"#1a1e28\"><\u002Fstop>\n      <\u002FlinearGradient>\n      <linearGradient id=\"v2-ground\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n        <stop offset=\"0\" stop-color=\"#1c4a41\"><\u002Fstop>\n        <stop offset=\"0.55\" stop-color=\"#143830\"><\u002Fstop>\n        <stop offset=\"1\" stop-color=\"#0c221e\"><\u002Fstop>\n      <\u002FlinearGradient>\n      <mask id=\"v2-mooncut\">\n        <rect x=\"1220\" y=\"30\" width=\"180\" height=\"180\" fill=\"white\"><\u002Frect>\n        <circle cx=\"1292\" cy=\"108\" r=\"37\" fill=\"black\"><\u002Fcircle>\n      <\u002Fmask>\n      <g id=\"v2-star\">\n        <circle r=\"30\" fill=\"#e8d76a\" opacity=\"0.1\"><\u002Fcircle>\n        <path d=\"M 0 -21 A 21 21 0 1 1 -20 -6\" stroke=\"#a8923c\" stroke-width=\"6\" fill=\"none\" stroke-linecap=\"round\" opacity=\"0.8\"><\u002Fpath>\n        <path d=\"M 2 -14 A 14 14 0 1 1 -13 -4\" stroke=\"#cbb84a\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\" opacity=\"0.95\"><\u002Fpath>\n        <path d=\"M 1 -8 A 8 8 0 1 1 -7 -2.5\" stroke=\"#e8d76a\" stroke-width=\"4.5\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n        <circle r=\"3\" fill=\"#f2e9a0\"><\u002Fcircle>\n      <\u002Fg>\n    <\u002Fdefs>\n\n    <rect x=\"0\" y=\"0\" width=\"1440\" height=\"700\" fill=\"url(#v2-sky)\"><\u002Frect>\n\n    <!-- the big wind swirl -->\n    <g transform=\"translate(0 78)\">\n    <g style=\"animation: cf-drift 16s ease-in-out infinite alternate;\" opacity=\"0.75\">\n      <path d=\"M150 300 C 360 200, 600 210, 740 280 C 850 335, 930 300, 920 240 C 912 195, 855 185, 835 225 C 820 258, 855 285, 900 275\" stroke=\"#6b93b0\" stroke-width=\"16\" fill=\"none\" stroke-linecap=\"round\" opacity=\"0.3\"><\u002Fpath>\n      <path d=\"M160 295 C 365 200, 598 215, 735 282 C 845 333, 922 298, 912 242 C 905 200, 858 192, 842 226 C 830 254, 858 278, 898 270\" stroke=\"#9cc0d8\" stroke-width=\"7\" fill=\"none\" stroke-linecap=\"round\" opacity=\"0.55\"><\u002Fpath>\n      <path d=\"M150 312 C 358 214, 594 224, 732 292 C 838 342, 918 310, 908 252\" stroke=\"#7fa7c4\" stroke-width=\"4\" fill=\"none\" stroke-linecap=\"round\" opacity=\"0.45\"><\u002Fpath>\n      <path d=\"M175 315 C 380 225, 590 238, 720 300 C 700 302, 660 310, 640 318\" stroke=\"#d7e5ec\" stroke-width=\"6\" fill=\"none\" stroke-linecap=\"round\" opacity=\"0.5\"><\u002Fpath>\n      <path d=\"M220 275 C 400 195, 560 200, 690 255\" stroke=\"#d7e5ec\" stroke-width=\"4\" fill=\"none\" stroke-linecap=\"round\" opacity=\"0.35\"><\u002Fpath>\n      <path d=\"M980 320 C 1090 280, 1200 285, 1270 330 C 1330 370, 1310 420, 1260 415 C 1225 411, 1218 375, 1248 365\" stroke=\"#6b93b0\" stroke-width=\"12\" fill=\"none\" stroke-linecap=\"round\" opacity=\"0.28\"><\u002Fpath>\n      <path d=\"M985 315 C 1092 278, 1198 283, 1264 326 C 1320 363, 1303 412, 1262 407 C 1232 403, 1226 375, 1250 366\" stroke=\"#8fb3c9\" stroke-width=\"10\" fill=\"none\" stroke-linecap=\"round\" opacity=\"0.6\"><\u002Fpath>\n    <\u002Fg>\n    <\u002Fg>\n\n    <!-- spiral stars -->\n    <g style=\"transform-origin: 260px 150px; transform-box: view-box; animation: cf-spin 90s linear infinite;\"><use href=\"#v2-star\" transform=\"translate(260 150) scale(1.55)\"><\u002Fuse><\u002Fg>\n    <g style=\"transform-origin: 465px 85px; transform-box: view-box; animation: cf-spin-rev 110s linear infinite;\"><use href=\"#v2-star\" transform=\"translate(465 85) scale(1.05)\"><\u002Fuse><\u002Fg>\n    <g style=\"transform-origin: 660px 165px; transform-box: view-box; animation: cf-spin 130s linear infinite;\"><use href=\"#v2-star\" transform=\"translate(660 165) scale(0.85)\"><\u002Fuse><\u002Fg>\n    <g style=\"transform-origin: 900px 95px; transform-box: view-box; animation: cf-spin-rev 100s linear infinite;\"><use href=\"#v2-star\" transform=\"translate(900 95) scale(1.3)\"><\u002Fuse><\u002Fg>\n    <g style=\"transform-origin: 1080px 210px; transform-box: view-box; animation: cf-spin 120s linear infinite;\"><use href=\"#v2-star\" transform=\"translate(1080 210) scale(0.9)\"><\u002Fuse><\u002Fg>\n    <g style=\"transform-origin: 330px 400px; transform-box: view-box; animation: cf-spin 140s linear infinite;\"><use href=\"#v2-star\" transform=\"translate(330 400) scale(0.75)\"><\u002Fuse><\u002Fg>\n    <g sty  8px;\">\n            <sc-for list=\"{{ campers }}\" as=\"c\" hint-placeholder-count=\"6\">\n              <button onclick=\"{{ c.pick }}\" title=\"{{ c.name }}\" style=\"background: rgba(24, 15, 7, 0.45); border: 2px solid {{ c.edge }}; border-radius: 10px; padding: 4px 2px 2px; cursor: pointer; line-height: 0; transition: border-color 0.15s ease, background 0.15s ease;\" style-hover=\"border-color: rgba(233, 143, 62, 0.75);\">\n                <svg viewBox=\"26 8 40 38\" width=\"100%\">\n                  <circle cx=\"46\" cy=\"32\" r=\"14\" fill=\"{{ c.face }}\"><\u002Fcircle>\n                  <path d=\"M32 30 a14 14 0 0 1 28 0 z\" fill=\"{{ c.color }}\"><\u002Fpath>\n                  <rect x=\"31\" y=\"27\" width=\"30\" height=\"6\" rx=\"3\" fill=\"{{ c.dark }}\"><\u002Frect>\n                  <circle cx=\"46\" cy=\"15\" r=\"4.5\" fill=\"#f1eee3\"><\u002Fcircle>\n                  <circle cx=\"43\" cy=\"37\" r=\"1.7\" fill=\"#2b2119\"><\u002Fcircle>\n                  <circle cx=\"52\" cy=\"37\" r=\"1.7\" fill=\"#2b2119\"><\u002Fcircle>\n                  <path d=\"M45 42 q3 2.6 6 0\" stroke=\"#2b2119\" stroke-width=\"1.3\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n                <\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"margin-top: 10px; font-size: 12.5px; color: #e6c9a3; min-height: 16px;\">{{ pickedLine }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ====== TOAST ====== -->\n  <div style=\"position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY({{ toastY }}px); opacity: {{ toastOpacity }}; z-index: 30; background: #e98f3e; color: #241405; font-weight: 600; font-size: 15px; padding: 12px 20px; border-radius: 999px; box-shadow: 0 6px 24px rgba(0, 0, 0, 0.4); pointer-events: none; transition: opacity 0.3s ease, transform 0.3s ease; white-space: nowrap;\">{{ toast }}<\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc
