<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campfire</title>
<link rel="stylesheet" href="theme.css">
</head>
<body>
<div id="app"></div>
<div id="banner" class="banner"></div>
<div id="ready-badge" class="ready-badge"></div>
<div id="float-timer" class="float-timer">
  <div class="timer-bar"><div class="timer-fill" id="float-fill"></div></div>
  <span class="timer-num" id="float-num"></span>
  <div id="float-controls"></div>
</div>
<div id="toast" class="toast"></div>
<div id="fire" class="fire-ambient campfire" style="--fire: 1;"></div>
<button id="mute-btn" class="mute-btn" title="Sound on/off" onclick="toggleMute()">🔊</button>

<script src="/socket.io/socket.io.js"></script>
<script src="art.js"></script>
<script src="sound.js"></script>
<script>
/* ==========================================================
   STORY RELAY — client
   ========================================================== */

const app = document.getElementById('app');
const banner = document.getElementById('banner');
const readyBadge = document.getElementById('ready-badge');
const fireEl = document.getElementById('fire');
const socket = io();

let S = null;
let renderedKey = '';
let timerInterval = null;
let voteInterval = null;
let autoReadyRound = -1;
let afkWarnedRound = -1;
let voteSent = false;
let pendingUp = null;
let pendingDown = null;
let drafts = {};        // round -> the text you've typed (survives un-ready)
let backspaces = {};    // round -> backspace count
let lastChimedRound = -1; // so the new-round chime plays once per round
let tadaPlayed = false;   // so the results fanfare plays once

/* ---------- Helpers ---------- */
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function countWords(text) { return text.trim().split(/\s+/).filter(Boolean).length; }
function save(key, val) { try { localStorage.setItem(key, val); } catch (e) {} }
function load(key) { try { return localStorage.getItem(key) || ''; } catch (e) { return ''; } }

/* ==========================================================
   CAMPFIRE ART
   ========================================================== */
fireEl.innerHTML = campfireSVG();

// Sets how alive the fire looks: 1 = roaring, 0 = smoldering coals
function setFire(stage, visible) {
  fireEl.style.setProperty('--fire', Math.max(0, Math.min(1, stage)));
  fireEl.style.display = visible ? 'block' : 'none';
  // The crackle follows the flames (the title screen keeps its own roaring fire)
  if (typeof Sound !== 'undefined') Sound.setFire(stage);
}

/* ---------- Sound chrome ---------- */
const muteBtn = document.getElementById('mute-btn');
function syncMuteBtn() { muteBtn.textContent = Sound.isMuted() ? '🔇' : '🔊'; }
function toggleMute() { Sound.toggleMute(); syncMuteBtn(); }
syncMuteBtn();



/* ---------- Connection plumbing ---------- */
socket.on('state', (st) => { S = st; banner.style.display = 'none'; render(); });
socket.on('connect', () => {
  const code = load('sr_code'), name = load('sr_name');
  if (code && name && !S) {
    socket.emit('join_room', { code, name, camper: load('sr_camper') || null }, (res) => { if (!res || !res.ok) renderHome(); });
  }
});
socket.on('disconnect', () => {
  banner.textContent = 'Connection lost — trying to reconnect…';
  banner.style.display = 'block';
});
// The host removed us from the room — forget it and go home so we don't auto-rejoin
socket.on('kicked', () => {
  save('sr_code', '');
  S = null;
  renderHome();
  const err = document.getElementById('home-error');
  if (err) err.textContent = 'The host removed you from that room.';
});

/* ---------- Master render ---------- */
function render() {
  if (!S) return renderHome();
  document.body.classList.remove('is-home'); // game screens use the normal centered column
  Sound.setCrickets(false);                  // crickets are a title-screen thing
  if (S.phase !== 'reading') { stopReadAloud(); stopChain(); }
  updateChrome();
  const key = screenKey();
  if (key === renderedKey) { patch(); return; }
  renderedKey = key;
  clearInterval(timerInterval);
  clearInterval(voteInterval);

  // A fresh story just landed in your hands — a gentle chime
  if (S.phase === 'writing' && !S.writing.ready && lastChimedRound !== S.writing.round) {
    lastChimedRound = S.writing.round;
    Sound.chime();
  }
  if (S.phase === 'results' && !tadaPlayed) { tadaPlayed = true; Sound.tada(); }
  if (S.phase !== 'results') tadaPlayed = false;

  if (S.phase === 'lobby') renderLobby();
  else if (S.phase === 'theming') renderTheming();
  else if (S.phase === 'writing') renderWriting();
  else if (S.phase === 'reading') renderReading();
  else if (S.phase === 'voting') renderVoting();
  else if (S.phase === 'results') renderResults();
}

function screenKey() {
  if (S.phase === 'writing') return 'writing-' + S.writing.round + '-' + S.writing.ready + '-' + S.writing.paused + '-' + S.writing.anyDisconnected;
  if (S.phase === 'reading') return 'reading-' + S.reading.index;
  if (S.phase === 'voting') return 'voting-' + S.voting.voted;
  if (S.phase === 'theming') return 'theming-' + S.theming.youAreDirector + '-' + (S.theming.headlines ? S.theming.headlines.length : 0);
  if (S.phase === 'lobby') return 'lobby-' + JSON.stringify(S.players) + JSON.stringify(S.settings) + S.isHost;
  return S.phase;
}

function patch() {
  if (S.phase === 'writing') {
    const list = document.getElementById('status-list');
    if (list) list.innerHTML = statusListHTML();
  }
  if (S.phase === 'voting') {
    const w = document.getElementById('waiting-on');
    if (w) w.textContent = waitingText();
  }
}

/* The campfire and ready-fraction badge live outside the screens */
function updateChrome() {
  // Ready badge + floating timer: visible to everyone during writing rounds
  const floatTimer = document.getElementById('float-timer');
  if (S && S.phase === 'writing') {
    readyBadge.style.display = 'flex';
    readyBadge.innerHTML = `${mallow('gold', 18)} ${S.writing.readyCount}/${S.writing.total} ready`;
  } else {
    readyBadge.style.display = 'none';
    if (floatTimer) floatTimer.style.display = 'none';
  }

  // The fire dwindles round by round, down to coals at the final round
  if (!S) { setFire(1, false); return; }
  if (S.phase === 'lobby') setFire(1, true);
  else if (S.phase === 'theming') setFire(1, true);
  else if (S.phase === 'writing') {
    const w = S.writing;
    const stage = w.totalRounds > 1 ? 1 - (w.round / (w.totalRounds - 1)) : 1;
    setFire(stage, true);
  }
  else if (S.phase === 'reading') setFire(0.1, true);
  else if (S.phase === 'voting') setFire(0.06, true);
  else if (S.phase === 'results') setFire(0.04, true);
}

/* ==========================================================
   SCREEN: HOME — hand-painted starry-night campfire title
   (recreated from the design handoff; scene builders live in art.js)
   ========================================================== */
let pickedCamper = load('sr_camper') || null;

function renderHome() {
  renderedKey = 'home';
  document.body.classList.add('is-home'); // lets the scene fill the whole window (see theme.css)
  Sound.setCrickets(true);   // night ambience for the painted scene
  Sound.setFire(1);          // the scene's fire roars even though the ambient one is hidden
  clearInterval(timerInterval);
  clearInterval(voteInterval);
  setFire(1, false);        // this screen has its own vector fire
  readyBadge.style.display = 'none';
  const ft = document.getElementById('float-timer'); if (ft) ft.style.display = 'none';

  const params = new URLSearchParams(location.search);
  const linkedRoom = (params.get('room') || '').toUpperCase().slice(0, 4);
  const savedName = load('sr_name');

  // Twinkling sparks
  const stars = [
    {x:8,y:26,d:3.2,dl:0},{x:18,y:8,d:4.1,dl:1.2},{x:27,y:20,d:3.6,dl:0.6},{x:36,y:6,d:4.6,dl:2.1},
    {x:47,y:25,d:3.9,dl:1.6},{x:55,y:9,d:3.3,dl:0.3},{x:63,y:30,d:4.4,dl:2.6},{x:72,y:18,d:3.7,dl:1.0},
    {x:43,y:40,d:4.0,dl:0.8},{x:58,y:44,d:3.5,dl:1.9},{x:12,y:44,d:4.8,dl:0.4},{x:85,y:36,d:4.2,dl:3.1},
  ].map(s => `<div style="position:absolute;left:${s.x}%;top:${s.y}%;width:2px;height:2px;border-radius:50%;background:#efe9d6;box-shadow:0 0 8px 2px rgba(239,233,214,0.5);animation:cf-twinkle ${s.d}s ease-in-out ${s.dl}s infinite;"></div>`).join('');

  // Smoke pool behind the title
  const pool = [
    {l:'6%',t:'30%',w:300,h:130,a:0.62,b:12,d:12,dl:0,dir:'alternate'},
    {l:'30%',t:'8%',w:380,h:150,a:0.68,b:12,d:15,dl:2,dir:'alternate-reverse'},
    {r:'4%',t:'34%',w:320,h:130,a:0.6,b:12,d:13,dl:1,dir:'alternate'},
    {l:'24%',t:'46%',w:460,h:120,a:0.5,b:16,d:17,dl:3,dir:'alternate-reverse'},
  ].map(p => `<div style="position:absolute;${p.l?'left:'+p.l:''};${p.r?'right:'+p.r:''};top:${p.t};width:${p.w}px;height:${p.h}px;border-radius:50%;background:radial-gradient(ellipse at center,rgba(158,168,177,${p.a}),rgba(158,168,177,0) 72%);filter:blur(${p.b}px);animation:cf-pool ${p.d}s ease-in-out ${p.dl}s infinite ${p.dir};"></div>`).join('');

  // Rising smoke column + embers from the fire
  const smokes = [
    {s:52,d:9,dl:0},{s:40,d:10,dl:1.2},{s:64,d:8.5,dl:2.4},{s:46,d:10.5,dl:3.6},
    {s:56,d:9.5,dl:4.8},{s:44,d:11,dl:6},{s:60,d:9,dl:7.2},{s:38,d:10,dl:8.4},
  ].map(p => `<div style="position:absolute;bottom:0;left:50%;width:${p.s}px;height:${p.s}px;border-radius:50%;background:radial-gradient(circle at 42% 40%,rgba(172,182,190,0.95),rgba(150,160,169,0.6) 62%,rgba(150,160,169,0) 78%);filter:blur(2px);opacity:0;animation:cf-smoke-rise ${p.d}s linear ${p.dl}s infinite;"></div>`).join('');
  const embers = [
    {x:-14,s:5,c:'#f2a33c',d:4.4,dl:0},{x:8,s:4,c:'#e25822',d:5.2,dl:1.4},{x:-2,s:3,c:'#f7d154',d:3.8,dl:2.5},
    {x:18,s:4,c:'#e98f3e',d:4.9,dl:3.4},{x:-22,s:3,c:'#e25822',d:5.6,dl:4.3},
  ].map(e => `<div style="position:absolute;bottom:10px;left:calc(50% + ${e.x}px);width:${e.s}px;height:${e.s}px;border-radius:50%;background:${e.c};box-shadow:0 0 6px 1px rgba(226,88,34,0.8);opacity:0;animation:cf-ember-rise ${e.d}s ease-out ${e.dl}s infinite;"></div>`).join('');

  // Title: arched, floating marshmallow letters
  const arcY = [46,20,5,0,0,5,20,46], arcR = [-11,-8,-4,-1,1,4,8,11];
  const letters = 'CAMPFIRE'.split('').map((ch,i) => {
    const dur = 4.6 + (i % 4) * 0.7, delay = -(i * 0.9);
    return `<span style="display:inline-block;transform:translateY(${arcY[i]}px) rotate(${arcR[i]}deg);"><span style="display:inline-block;animation:cf-letter-float ${dur}s ease-in-out ${delay}s infinite alternate;text-shadow:0 3px 0 rgba(216,208,189,.85),0 -1px 0 rgba(255,255,255,.9),0 8px 22px rgba(9,14,21,.65),0 0 34px rgba(241,238,227,.28);">${ch}</span></span>`;
  }).join('');

  // Seating-log ring
  const backLogs = [{x:0,y:-34,w:74,rot:-3},{x:-152,y:-6,w:86,rot:8},{x:152,y:-6,w:86,rot:-8}];
  const frontLogs = [{x:-104,y:32,w:94,rot:-10},{x:104,y:32,w:94,rot:10},{x:0,y:50,w:102,rot:2}];
  const logHTML = (arr) => arr.map(g => `<div style="position:absolute;left:${g.x}px;top:${g.y}px;transform:translate(-50%,-50%) rotate(${g.rot}deg);">${sceneLog(g.w)}</div>`).join('');

  // Forest trees
  const leftTrees = [
    {x:190,b:74,w:96,f:'#15222e',d:13,dl:2},{x:96,b:46,w:130,f:'#101c28',d:12,dl:0.8},
    {x:150,b:12,w:170,f:'#0c1620',d:10,dl:1.6},{x:30,b:20,w:185,f:'#0a121c',d:11,dl:0.4},
  ];
  const rightTrees = [
    {x:200,b:78,w:92,f:'#15222e',d:14,dl:1.2},{x:110,b:42,w:135,f:'#101c28',d:12.5,dl:2.4},
    {x:156,b:8,w:175,f:'#0c1620',d:10.5,dl:0.6},{x:36,b:18,w:190,f:'#0a121c',d:11.5,dl:1.8},
  ];
  const treeHTML = (arr, side) => arr.map(t => `<div style="position:absolute;${side}:${t.x}px;bottom:${t.b}px;transform-origin:50% 100%;animation:cf-sway ${t.d}s ease-in-out ${t.dl}s infinite ${side==='left'?'alternate':'alternate-reverse'};">${sceneTree(t.w,t.f)}</div>`).join('');

  // Camper picker + seated camper
  const picked = CAMPERS.find(c => c.id === pickedCamper) || null;
  const camperBtns = CAMPERS.map(c => sceneCamperButton(c, pickedCamper === c.id)).join('');
  const seatLabel = savedName.trim() ? savedName.trim() : (picked ? picked.name + ' (you)' : '');
  const seated = picked ? sceneSeatedCamper(picked.color, picked.dark, picked.face, seatLabel) : '';
  const pickedLine = picked ? picked.name + ' is warming up by the fire \u2713' : '';

  app.innerHTML = `
  <div class="home-stage">
    ${sceneSky()}
    <div aria-hidden="true" style="position:absolute;inset:0;z-index:1;pointer-events:none;">
      ${stars}
      <div style="position:absolute;right:18%;top:8%;width:90px;height:2px;border-radius:2px;background:linear-gradient(90deg,rgba(241,238,227,0),rgba(241,238,227,0.95));transform-origin:right center;rotate:155deg;animation:cf-star-shoot 26s linear 6s infinite;"></div>
    </div>
    <div aria-hidden="true" style="position:absolute;left:50%;top:2%;width:880px;height:240px;transform:translateX(-50%);z-index:3;pointer-events:none;">${pool}</div>
    <div aria-hidden="true" class="home-smoke-spot" style="position:absolute;left:50%;bottom:36%;width:320px;height:60%;transform:translateX(-50%);z-index:3;pointer-events:none;">${smokes}${embers}</div>

    <div style="position:absolute;left:50%;top:5.5%;transform:translateX(-50%);z-index:4;text-align:center;pointer-events:none;">
      <h1 aria-label="Campfire" class="home-title">${letters}</h1>
      <p class="home-tagline">Round-robin stories around the fire. Write, pass, ruin, vote.</p>
    </div>

    <div aria-hidden="true" style="position:absolute;left:0;top:13%;z-index:2;pointer-events:none;animation:cf-owl-fly 44s linear infinite;">
      <svg viewBox="0 0 90 40" width="74"><g fill="#0e1520"><ellipse cx="45" cy="22" rx="16" ry="8"/><circle cx="60" cy="17" r="6.5"/><path d="M64 12 l3 -4 l1 4 z M58 11 l-1 -4 l3 3 z"/><path d="M29 22 l-11 3 l11 2 z"/></g><path d="M45 20 q-8 -14 -20 -13 q7 10 16 14 z" fill="#0e1520" style="transform-origin:45px 20px;animation:cf-owl-flap 0.55s ease-in-out infinite alternate;"/></svg>
    </div>

    <div class="home-fire-spot" style="position:absolute;left:50%;bottom:36%;transform:translateX(-50%);z-index:5;width:0;height:0;">
      <div style="position:absolute;left:0;top:10px;width:460px;height:300px;transform:translate(-50%,-62%);background:radial-gradient(ellipse at 50% 62%,rgba(7,15,13,0.88) 32%,rgba(7,15,13,0) 72%);filter:blur(8px);pointer-events:none;"></div>
      ${logHTML(backLogs)}
      <div style="position:absolute;left:0;top:0;transform:translate(-50%,-88%);pointer-events:none;">${sceneFireSVG()}</div>
      ${logHTML(frontLogs)}
      ${seated}
    </div>

    <div aria-hidden="true" style="position:absolute;inset:0;z-index:6;pointer-events:none;">
      ${treeHTML(leftTrees,'left')}
      ${treeHTML(rightTrees,'right')}
      <div style="position:absolute;left:-30px;bottom:0;transform-origin:50% 100%;animation:cf-sway 9s ease-in-out infinite alternate;">
        <svg viewBox="0 0 240 560" width="235"><g fill="#081018"><path d="M70 560 L70 430 L40 440 L78 350 L52 358 L92 268 L70 274 L112 178 L96 182 L132 92 L168 182 L152 178 L194 274 L172 268 L212 358 L186 350 L224 440 L194 430 L194 560 Z" opacity="0.98"/><path d="M28 560 L28 480 L10 486 L34 420 L20 424 L48 356 L76 424 L62 420 L86 486 L68 480 L68 560 Z" opacity="0.9"/></g>
          <g transform="translate(128 236)"><path d="M-34 12 L30 12 L30 17 L-34 17 Z" fill="#081018"/><ellipse cx="0" cy="2" rx="13" ry="9" fill="#2a3948"/><circle cx="12" cy="-6" r="7" fill="#2a3948"/><path d="M7 -11 l2 -5 l3.5 4 z M14 -12 l3 -4.5 l2 5 z" fill="#2a3948"/><path d="M7.5 -6.5 a5.5 5 0 0 1 9 0 q-1.5 4 -4.5 4 q-3 0 -4.5 -4 z" fill="#c9d0d8" opacity="0.95"/><path d="M8 -7.5 l3 2.4 l-3.6 1.6 z M17.6 -7.5 l-3 2.4 l3.6 1.6 z" fill="#141b25"/><circle cx="10.6" cy="-5.4" r="1.1" fill="#0a0f16"/><circle cx="14.6" cy="-5.4" r="1.1" fill="#0a0f16"/><g style="transform-origin:-11px 4px;animation:cf-tail-swish 2.6s ease-in-out infinite alternate;"><path d="M-11 4 q-14 -2 -17 -16 q6 -2 9 3 q-4 -1 -5 2 q6 8 13 7 z" fill="#2a3948"/><path d="M-20 -5 q-3 0 -4.5 -3 q3 -1.5 5.5 0 z M-25 -9 q-2.5 -0.5 -3 -3 q2.6 -1 4.5 0.6 z" fill="#c9d0d8" opacity="0.7"/></g></g>
        </svg>
      </div>
      <div style="position:absolute;right:-34px;bottom:0;transform-origin:50% 100%;animation:cf-sway 11s ease-in-out 1.5s infinite alternate-reverse;">
        <svg viewBox="0 0 220 500" width="215"><g fill="#081018"><path d="M96 500 L96 390 L70 398 L102 318 L80 324 L116 240 L98 245 L134 158 L120 162 L150 82 L180 162 L166 158 L202 245 L184 240 L220 324 L198 318 L230 398 L204 390 L204 500 Z" opacity="0.98"/><path d="M30 500 L30 440 L14 445 L36 386 L24 390 L48 330 L72 390 L60 386 L82 445 L66 440 L66 500 Z" opacity="0.9"/></g></svg>
        <div style="position:absolute;left:-6px;bottom:120px;width:110px;height:150px;overflow:hidden;">
          <svg viewBox="0 0 90 130" width="86" style="animation:cf-bigfoot-peek 38s ease-in-out infinite;"><g fill="#0d1620"><ellipse cx="46" cy="86" rx="26" ry="40"/><circle cx="42" cy="34" r="17"/><path d="M42 16 q-14 4 -14 20 l-4 -2 q0 -20 18 -22 z"/><path d="M25 60 q-12 8 -10 24 l6 2 q-2 -14 8 -20 z"/></g><circle cx="37" cy="32" r="2" fill="#c9d0d8" opacity="0.9"/><circle cx="47" cy="32" r="2" fill="#c9d0d8" opacity="0.9"/></svg>
        </div>
      </div>
    </div>

    <div aria-hidden="true" style="position:absolute;inset:0;z-index:7;pointer-events:none;background:radial-gradient(ellipse 68% 64% at 50% 50%,rgba(4,8,10,0) 48%,rgba(4,8,10,.38) 74%,rgba(2,4,7,.85) 100%);"></div>

    <div class="home-signs" style="position:absolute;left:50%;bottom:26px;transform:translateX(-50%);z-index:10;display:flex;align-items:flex-end;gap:34px;">
      <div class="home-sign-form" style="position:relative;transform:rotate(-0.8deg);">
        <div style="position:absolute;left:50%;bottom:-26px;transform:translateX(-50%);width:20px;height:74px;background:linear-gradient(90deg,#3c2a19,#5c3f28 40%,#2e1f12);border:2px solid #241708;border-radius:5px;"></div>
        <div style="position:relative;padding:22px 46px 24px 30px;">
          <svg viewBox="0 0 600 210" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%;"><path d="M14 24 Q 12 8 30 9 L 552 4 L 594 105 L 550 206 L 28 200 Q 12 201 13 186 Z" fill="#7a5334" stroke="#2e1d0f" stroke-width="6" stroke-linejoin="round"/><path d="M14 24 Q 12 8 30 9 L 552 4 L 594 105 L 550 206 L 28 200 Q 12 201 13 186 Z" fill="none" stroke="#93684a" stroke-width="2" transform="translate(3 4)" opacity="0.5"/><g stroke="#3f2a16" stroke-width="3.5" stroke-linecap="round" opacity="0.55" fill="none"><path d="M40 40 h84"/><path d="M150 34 h52"/><path d="M420 46 h96"/><path d="M60 176 h110"/><path d="M340 182 h70"/><path d="M470 168 h64"/><path d="M250 26 h44"/></g><g fill="#4a3018" opacity="0.7"><ellipse cx="62" cy="108" rx="7" ry="9"/><ellipse cx="62" cy="108" rx="3" ry="4.2" fill="#33200e"/><ellipse cx="566" cy="104" rx="6" ry="7.5"/><ellipse cx="566" cy="104" rx="2.6" ry="3.4" fill="#33200e"/></g></svg>
          <div class="sign-grid" style="position:relative;display:grid;grid-template-columns:1fr auto 1fr;gap:18px;align-items:stretch;">
            <div style="display:flex;flex-direction:column;gap:12px;">
              <div>
                <label style="display:block;font-size:13.5px;color:#e6c9a3;margin-bottom:6px;">Your camper's name</label>
                <input id="name-input" class="sign-input" type="text" maxlength="20" placeholder="What your friends call you" value="${esc(savedName)}">
              </div>
              <button class="sign-btn" onclick="createRoom()">Light a fire (create room)</button>
            </div>
            <div class="sign-or" style="display:flex;flex-direction:column;align-items:center;gap:6px;">
              <div class="sign-or-line" style="flex:1;width:2px;background:rgba(46,29,15,0.5);border-radius:2px;"></div>
              <span style="font-size:12px;color:#e6c9a3;">or</span>
              <div class="sign-or-line" style="flex:1;width:2px;background:rgba(46,29,15,0.5);border-radius:2px;"></div>
            </div>
            <div style="display:flex;flex-direction:column;gap:12px;">
              <div>
                <label style="display:block;font-size:13.5px;color:#e6c9a3;margin-bottom:6px;">Join a fire with a room code</label>
                <input id="code-input" class="sign-input" type="text" maxlength="4" placeholder="e.g. WXYZ" style="text-transform:uppercase;" value="${esc(linkedRoom)}">
              </div>
              <button class="sign-btn secondary" onclick="joinRoom()">Join room</button>
            </div>
          </div>

/* ==========================================================
   AUDIO RECORDING (audio mode only)
   Uses the browser's MediaRecorder. The finished clip is held
   as a base64 data URL and sent with the 'ready' event.
   ========================================================== */
let mediaRecorder = null;
let recordedChunks = [];
let recordedClip = null;   // base64 data URL of this round's recording
let recording = false;

function resetRecorder() {
  recordedClip = null;
  recording = false;
  const btn = document.getElementById('ready-btn');
  if (btn) btn.disabled = true;
}

async function toggleRecord() {
  const btn = document.getElementById('rec-btn');
  const status = document.getElementById('rec-status');
  const playback = document.getElementById('rec-playback');
  const readyBtn = document.getElementById('ready-btn');

  if (recording) {
    // Stop
    mediaRecorder.stop();
    return;
  }

  // Start
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    recordedChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop()); // release the mic
      const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
      const reader = new FileReader();
      reader.onload = () => {
        recordedClip = reader.result; // data:audio/...;base64,...
        if (playback) { playback.src = recordedClip; playback.style.display = 'block'; }
        if (readyBtn) readyBtn.disabled = false;
        if (status) status.textContent = 'Recorded! Listen back, or re-record.';
        if (btn) btn.textContent = '● Re-record';
      };
      reader.readAsDataURL(blob);
      recording = false;
    };
    mediaRecorder.start();
    recording = true;
    if (btn) btn.textContent = '■ Stop recording';
    if (status) status.textContent = 'Recording… tap to stop.';
    if (playback) playback.style.display = 'none';
  } catch (err) {
    if (status) status.textContent = 'Mic blocked — allow microphone access in your browser to record.';
  }
}

function onType() {
  const input = document.getElementById('segment-input');
  if (input && S.writing) {
    drafts[S.writing.round] = input.value;
    saveDraft(S.writing.round, input.value); // survive a wifi drop
  }
  updateWordCount();
}

// Drafts are keyed by room code + round so different rooms don't collide
function draftKey(round) { return 'sr_draft_' + (S ? S.code : '') + '_' + round; }
function saveDraft(round, text) { save(draftKey(round), text); }
function loadDraft(round) { return load(draftKey(round)); }
function clearDrafts() {
  try {
    for (let i = 0; i < 20; i++) localStorage.removeItem('sr_draft_' + (S ? S.code : '') + '_' + i);
  } catch (e) {}
}

function startCountdown(canAutoReady) {
  clearInterval(timerInterval);
  const tick = () => {
    if (!S || !S.writing) return;
    const ft = document.getElementById('float-timer');
    const fill = document.getElementById('float-fill');
    const num = document.getElementById('float-num');
    const total = S.settings.seconds * 1000;

    if (S.writing.paused) {
      // Frozen: show the held time, no ticking, no auto-submit
      const left = S.writing.pausedRemaining;
      if (ft) ft.style.display = 'flex';
      if (fill && num) {
        fill.style.width = (left / total * 100) + '%';
        fill.classList.add('paused');
        num.textContent = '⏸ paused';
      }
      return;
    }

    const left = Math.max(0, S.writing.endsAt - Date.now());
    if (ft) ft.style.display = 'flex';
    if (fill && num) {
      fill.style.width = (left / total * 100) + '%';
      fill.classList.toggle('low', left <= 10000);
      fill.classList.remove('paused');
      const sec = Math.ceil(left / 1000);
      num.textContent = Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0');
    }

    // AFK warning toast at the 30-second mark (only if you haven't readied)
    if (canAutoReady && !S.writing.ready && left <= 30000 && left > 29000 && afkWarnedRound !== S.writing.round) {
      afkWarnedRound = S.writing.round;
      showToast('⏰ 30 seconds left — wrap up your part!');
    }

    if (left <= 0 && canAutoReady && autoReadyRound !== S.writing.round) {
      autoReadyRound = S.writing.round;
      goReady(true);
    }
  };
  tick();
  timerInterval = setInterval(tick, 250);
}

// A brief toast notification, top-center
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
}

function updateWordCount() {
  const input = document.getElementById('segment-input');
  const counter = document.getElementById('word-count');
  const btn = document.getElementById('ready-btn');
  if (!input || !counter || !btn) return;
  const s = S.settings;
  const w = countWords(input.value);
  const overMax = s.maxWords > 0 && w > s.maxWords;
  const underMin = w < s.minWords;

  if (overMax) {
    counter.textContent = `${w} words — over the ${s.maxWords}-word limit, trim it down`;
    counter.className = 'word-count bad';
  } else if (underMin) {
    counter.textContent = `${w} / ${s.minWords} words minimum`;
    counter.className = 'word-count';
  } else {
    counter.textContent = s.maxWords > 0 ? `${w} words (max ${s.maxWords}) — looking good` : `${w} words — looking good`;
    counter.className = 'word-count good';
  }
  btn.disabled = underMin || overMax;
}

function goReady(timeRanOut) {
  if (!S || !S.writing || S.writing.ready) return;
  if (!timeRanOut) Sound.click();
  const round = S.writing.round;
  const roundStart = S.writing.endsAt - S.settings.seconds * 1000;
  const seconds = Math.max(0, (Date.now() - roundStart) / 1000);

  if (S.mode === 'audio') {
    // If time ran out mid-recording, stop and let onstop send; otherwise send now
    if (recording && mediaRecorder) { try { mediaRecorder.stop(); } catch (e) {} }
    if (!recordedClip && !timeRanOut) return; // nothing to send yet
    socket.emit('ready', { audio: recordedClip, seconds });
  } else {
    const input = document.getElementById('segment-input');
    const text = input ? input.value : (drafts[round] || '');
    drafts[round] = text;
    socket.emit('ready', { text, backspaces: backspaces[round] || 0, seconds });
    saveDraft(round, '');
  }
  if (!timeRanOut) renderedKey = 'sending';
}

/* Play every clip in a story back-to-back (audio mode). */
let chainPlaying = false;
function playChain() {
  const chain = document.getElementById('clip-chain');
  if (!chain) return;
  const players = Array.from(chain.querySelectorAll('audio'));
  if (!players.length) return;
  const btn = document.getElementById('chain-play');
  stopChain();
  chainPlaying = true;
  if (btn) btn.textContent = '⏹ Stop';

  let i = 0;
  const playNext = () => {
    if (!chainPlaying || i >= players.length) { stopChain(); return; }
    const p = players[i];
    p.onended = () => { i++; playNext(); };
    const tryPlay = p.play();
    if (tryPlay && tryPlay.catch) tryPlay.catch(() => { /* autoplay blocked — user can press play */ stopChain(); });
  };
  playNext();
}
function stopChain() {
  chainPlaying = false;
  const chain = document.getElementById('clip-chain');
  if (chain) chain.querySelectorAll('audio').forEach(a => { a.onended = null; });
  const btn = document.getElementById('chain-play');
  if (btn) btn.textContent = '▶ Play all in order';
}

/* Text-to-speech with the browser's built-in voice. No server needed. */
let ttsActive = false;
function toggleReadAloud() {
  if (!('speechSynthesis' in window)) {
    showToast ? showToast('Text-to-speech isn\'t supported in this browser.') : alert('Text-to-speech not supported here.');
    return;
  }
  const btn = document.getElementById('tts-btn');
  if (ttsActive) { stopReadAloud(); return; }

  const r = S.reading;
  const fullText = r.segments.map(s => s.text).join(' ');
  const utter = new SpeechSynthesisUtterance(fullText);
  utter.rate = 0.95;
  utter.onend = () => { ttsActive = false; if (btn) btn.textContent = '🔊 Read aloud'; };
  utter.onerror = () => { ttsActive = false; if (btn) btn.textContent = '🔊 Read aloud'; };
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utter);
  ttsActive = true;
  if (btn) btn.textContent = '⏹ Stop reading';
}
function stopReadAloud() {
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  ttsActive = false;
  const btn = document.getElementById('tts-btn');
  if (btn) btn.textContent = '🔊 Read aloud';
}

function toggleAuthors(btn) {
  const labels = document.querySelectorAll('.author-label');
  const hidden = labels.length && labels[0].style.display === 'none';
  labels.forEach(l => l.style.display = hidden ? 'block' : 'none');
  btn.textContent = hidden ? 'Hide who wrote what' : 'Show who wrote what';
}

let pendingCamper = null;
function pickCamper(id) {
  pendingCamper = (pendingCamper === id) ? null : id;
  Sound.pop();
  (S.voting.campers || []).forEach(c => {
    const el = document.getElementById('camper-' + c.id);
    if (el) el.classList.toggle('picked', pendingCamper === c.id);
  });
  updateLockButton();
}

function pickGold(i) {
  pendingUp = (pendingUp === i) ? null : i;
  if (pendingDown === i) pendingDown = null;
  Sound.pop();
  paintVotes();
}
function pickBurnt(i) {
  pendingDown = (pendingDown === i) ? null : i;
  if (pendingUp === i) pendingUp = null;
  Sound.pop();
  paintVotes();
}
function paintVotes() {
  S.voting.options.forEach(o => {
    const g = document.getElementById('gold-' + o.index);
    const b = document.getElementById('burnt-' + o.index);
    if (g) g.classList.toggle('picked-gold', pendingUp === o.index);
    if (b) b.classList.toggle('picked-burnt', pendingDown === o.index);
  });
  updateLockButton();
}

function updateLockButton() {
  const lock = document.getElementById('lock-votes');
  if (lock) lock.disabled = (pendingUp === null || pendingDown === null);
}

function startVoteCountdown() {
  clearInterval(voteInterval);
  const tick = () => {
    if (!S || !S.voting) return;
    const total = S.settings.votingSeconds * 1000;
    const left = Math.max(0, S.voting.endsAt - Date.now());
    const fill = document.getElementById('vote-fill');
    const num = document.getElementById('vote-num');
    if (fill && num) {
      fill.style.width = (left / total * 100) + '%';
      fill.classList.toggle('low', left <= 4000);
      num.textContent = '0:' + String(Math.ceil(left / 1000)).padStart(2, '0');
    }
    if (left <= 0) lockVotes(true); // time's up — send whatever's picked
  };
  tick();
  voteInterval = setInterval(tick, 200);
}

function lockVotes(timeRanOut) {
  if (voteSent) return;
  if (!timeRanOut && (pendingUp === null || pendingDown === null)) return;
  voteSent = true;
  clearInterval(voteInterval);
  socket.emit('cast_vote', { up: pendingUp, down: pendingDown, bestCamper: pendingCamper });
}

/* Build a readable text file of the whole game and download it */
function exportGame() {
  const r = S.results;
  const L = [];
  L.push('CAMPFIRE — Story Night');
  L.push(new Date().toLocaleString());
  if (S.theme) L.push('Theme: ' + S.theme);
  L.push('');
  L.push('========================================');
  L.push('WINNER: ' + r.winners.join(' & '));
  L.push('========================================');
  L.push('');
  r.stories.forEach((story, i) => {
    L.push('----------------------------------------');
    L.push((i + 1) + '. ' + story.ownerName + "'s story");
    const t = r.tally.find(x => x.ownerName === story.ownerName);
    if (t) L.push('   Votes: ' + t.up + ' golden, ' + t.down + ' burnt  (net ' + (t.score >= 0 ? '+' : '') + t.score + ')');
    L.push('');
    story.segments.forEach(seg => {
      L.push('   [' + seg.author + ']');
      if (S.mode === 'audio') {
        L.push('   (audio recording — clips aren\'t saved to this text file)');
      } else {
        // wrap each segment at ~76 chars for readability
        seg.text.replace(/(.{1,72})(\s|$)/g, '$1\n').trim().split('\n').forEach(line => L.push('   ' + line));
      }
      L.push('');
    });
  });
  L.push('========================================');
  L.push('CAMPFIRE AWARDS');
  r.awards.forEach(a => L.push('  ' + a.title + ' (' + a.desc + '): ' + a.name + ' — ' + a.value));
  if (r.bestCampers && r.bestCampers.length) {
    L.push('  Best Overall Camper: ' + r.bestCampers.join(' & '));
  }
  L.push('========================================');

  const blob = new Blob([L.join('\n')], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'campfire-stories.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ==========================================================
   THE SHAREABLE RESULT CARD
   Draws the night's results as a 1080×1350 PNG — night sky,
   winner + their camper, the winning opening line, the
   marshmallow tally, and the awards — ready to drop straight
   into the group's Discord. Uses the phone's native share
   sheet when available, otherwise downloads the image.
   ========================================================== */
function shareResultsCard() {
  const r = S.results;
  const W = 1080, H = 1350;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const x = cv.getContext('2d');

  // --- night sky ---
  const sky = x.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#33261a'); sky.addColorStop(0.4, '#1a1e28'); sky.addColorStop(1, '#0c1a17');
  x.fillStyle = sky; x.fillRect(0, 0, W, H);
  // stars
  for (let i = 0; i < 90; i++) {
    x.fillStyle = `rgba(239,233,214,${0.25 + Math.random() * 0.6})`;
    const sx = Math.random() * W, sy = Math.random() * H * 0.5, sr = Math.random() * 1.8 + 0.5;
    x.beginPath(); x.arc(sx, sy, sr, 0, 7); x.fill();
  }
  // moon
  x.fillStyle = '#e8d76a'; x.beginPath(); x.arc(950, 110, 46, 0, 7); x.fill();
  x.fillStyle = '#1a1e28'; x.beginPath(); x.arc(930, 96, 38, 0, 7); x.fill();

  // --- arched CAMPFIRE wordmark ---
  x.textAlign = 'center';
  const word = 'CAMPFIRE';
  const arcY = [26, 12, 3, 0, 0, 3, 12, 26];
  x.font = '900 92px system-ui, sans-serif';
  const startX = W / 2 - 355;
  word.split('').forEach((ch, i) => {
    x.save();
    x.translate(startX + i * 101, 150 + arcY[i]);
    x.shadowColor = 'rgba(0,0,0,0.6)'; x.shadowBlur = 14; x.shadowOffsetY = 5;
    x.fillStyle = '#fbf7ec'; x.fillText(ch, 0, 0);
    x.restore();
  });
  x.font = '26px system-ui, sans-serif';
  x.fillStyle = '#b8b3a6';
  x.fillText('Story night results — ' + new Date().toLocaleDateString(), W / 2, 205);
  if (S.theme) {
    x.fillStyle = '#e6c9a3';
    x.fillText('Theme: ' + trimTo(S.theme, 52), W / 2, 240);
  }

  // --- a little campfire ---
  drawCardFire(x, W / 2, 380);

  // --- winner banner ---
  drawMallow(x, W / 2 - 200, 470, 34, 'gold');
  drawMallow(x, W / 2 + 200, 470, 34, 'gold');
  x.fillStyle = '#f0c987';
  x.font = 'bold 34px system-ui, sans-serif';
  x.fillText('WINNER' + (r.winners.length > 1 ? 'S' : ''), W / 2, 458);
  x.fillStyle = '#fbf7ec';
  x.font = '900 52px system-ui, sans-serif';
  x.fillText(trimTo(r.winners.join(' & '), 26), W / 2, 520);

  // the winning story's opening line, as a pull-quote
  const winStory = r.stories.find(st => st.ownerName === r.winners[0]);
  if (winStory && S.mode !== 'audio') {
    x.font = 'italic 30px Georgia, serif';
    x.fillStyle = '#d9d4c6';
    const lines = wrapText(x, '“' + winStory.segments[0].text + '”', 880, 3);
    lines.forEach((ln, i) => x.fillText(ln, W / 2, 578 + i * 40));
  }

  // --- tally ---
  let y = 740;
  x.textAlign = 'left';
  x.font = 'bold 30px system-ui, sans-serif';
  x.fillStyle = '#e98f3e';
  x.fillText('THE TALLY', 110, y); y += 16;
  r.tally.slice(0, 8).forEach(t => {
    y += 52;
    x.fillStyle = 'rgba(18,26,38,0.75)';
    roundRect(x, 92, y - 36, 896, 46, 12); x.fill();
    x.fillStyle = '#f1eee3';
    x.font = '28px system-ui, sans-serif';
    x.fillText(trimTo(t.ownerName, 18) + "'s story", 112, y - 3);
    drawMallow(x, 700, y - 14, 15, 'gold');
    drawMallow(x, 800, y - 14, 15, 'burnt');
    x.fillText(String(t.up), 726, y - 3);
    x.fillText(String(t.down), 826, y - 3);
    x.font = 'bold 28px system-ui, sans-serif';
    x.fillStyle = t.score >= 0 ? '#7cc79a' : '#e8705f';
    x.fillText((t.score >= 0 ? '+' : '') + t.score, 910, y - 3);
  });

  // --- awards ---
  y += 74;
  x.font = 'bold 30px system-ui, sans-serif';
  x.fillStyle = '#e98f3e';
  x.fillText('CAMPFIRE AWARDS', 110, y);
  y += 14;
  r.awards.forEach(a => {
    y += 44;
    x.font = '26px system-ui, sans-serif';
    x.fillStyle = '#f0c987';
    x.fillText(a.title, 112, y);
    x.fillStyle = '#f1eee3';
    x.fillText(a.name + '  ·  ' + a.value, 420, y);
  });
  if (r.bestCampers && r.bestCampers.length) {
    y += 44;
    x.fillStyle = '#f0c987';
    x.fillText('🏕️ Best Overall Camper', 112, y);
    x.fillStyle = '#f1eee3';
    x.fillText(r.bestCampers.join(' & '), 420, y);
  }

  // --- footer ---
  x.textAlign = 'center';
  x.font = '24px system-ui, sans-serif';
  x.fillStyle = '#b8b3a6';
  x.fillText('Round-robin stories around the fire · room ' + S.code, W / 2, H - 40);

  // --- ship it: native share sheet on phones, download elsewhere ---
  const btn = document.getElementById('share-card-btn');
  cv.toBlob(blob => {
    if (!blob) return;
    const file = new File([blob], 'campfire-results.png', { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file], title: 'Campfire — story night results' }).catch(() => {});
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'campfire-results.png';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
    if (btn) { btn.textContent = '📸 Card ready!'; setTimeout(() => btn.textContent = '📸 Share result card', 2000); }
  }, 'image/png');
}

/* ---------- little canvas helpers for the card ---------- */
function trimTo(s, n) { s = String(s); return s.length > n ? s.slice(0, n - 1) + '…' : s; }

function wrapText(x, text, maxWidth, maxLines) {
  const words = text.split(/\s+/);
  const lines = [];
  let line = '';
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (x.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = w;
      if (lines.length === maxLines - 1) {
        // last line gets whatever fits, then an ellipsis
        let rest = words.slice(words.indexOf(w)).join(' ');
        while (x.measureText(rest + '…').width > maxWidth && rest.includes(' ')) {
          rest = rest.slice(0, rest.lastIndexOf(' '));
        }
        lines.push(rest + (rest === words.slice(words.indexOf(w)).join(' ') ? '' : '…'));
        return lines;
      }
    } else line = test;
  }
  if (line) lines.push(line);
  return lines;
}

function roundRect(x, rx, ry, rw, rh, rad) {
  x.beginPath();
  x.moveTo(rx + rad, ry);
  x.arcTo(rx + rw, ry, rx + rw, ry + rh, rad);
  x.arcTo(rx + rw, ry + rh, rx, ry + rh, rad);
  x.arcTo(rx, ry + rh, rx, ry, rad);
  x.arcTo(rx, ry, rx + rw, ry, rad);
  x.closePath();
}

function drawMallow(x, cx, cy, size, kind) {
  x.save();
  x.fillStyle = kind === 'gold' ? '#f0c987' : '#3a3531';
  x.strokeStyle = kind === 'gold' ? '#c9974f' : '#1f1c19';
  x.lineWidth = size * 0.14;
  roundRect(x, cx - size * 0.85, cy - size * 0.6, size * 1.7, size * 1.2, size * 0.4);
  x.fill(); x.stroke();
  x.restore();
}

function drawCardFire(x, cx, cy) {
  // logs
  x.save();
  x.strokeStyle = '#7a5a3a'; x.lineWidth = 20; x.lineCap = 'round';
  x.beginPath(); x.moveTo(cx - 95, cy + 28); x.lineTo(cx + 75, cy + 62); x.stroke();
  x.beginPath(); x.moveTo(cx + 95, cy + 28); x.lineTo(cx - 75, cy + 62); x.stroke();
  // flame: three teardrop layers
  const flame = (w, h, color, alpha) => {
    x.fillStyle = color; x.globalAlpha = alpha;
    x.beginPath();
    x.moveTo(cx, cy - h);
    x.bezierCurveTo(cx + w, cy - h * 0.35, cx + w * 0.8, cy + 30, cx, cy + 38);
    x.bezierCurveTo(cx - w * 0.8, cy + 30, cx - w, cy - h * 0.35, cx, cy - h);
    x.fill();
  };
  flame(72, 135, '#e6772e', 1);
  flame(50, 100, '#f2a33c', 1);
  flame(28, 62, '#f7d154', 1);
  x.globalAlpha = 1;
  x.restore();
}

renderHome();
